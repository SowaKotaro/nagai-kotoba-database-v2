# ローカル開発用の MySQL 8.4（CI・本番と同じ MySQL 8 系）。
# ローカルの MariaDB が 3306 を使用しているため、ホスト側は 3307 に公開する。
# 起動: docker compose up -d
services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "true"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
