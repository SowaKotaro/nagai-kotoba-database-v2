# 単語フィクスチャ。char_type_pattern はフィクスチャ読込では
# コールバックが走らないため、surface に対応する値を明示しておく。
# annotated_at ありは公開対象(注釈済み)、無しは未注釈(公開されない)。
abc_murder:
  surface: ABC殺人事件
  char_type_pattern: AAA漢漢漢漢
  annotated_at: 2026-06-01 10:00:00

curry:
  surface: カレーライス
  char_type_pattern: アアアアアア
  annotated_at: 2026-06-02 10:00:00

