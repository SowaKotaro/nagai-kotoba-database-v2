# 言語学的特徴の用語解説(単一ソース)。docs/annotation-guidelines.md §6 から参照される。
# name は db/seeds/linguistic_features.rb のマスタ名と1対1で対応させる(テストで担保)。
# description は言語学的な説明、examples は「もと → 実際の形(変化の説明)」形式の具体例3〜5件。
# アノテーション・コンソールの「用語解説」パネル(LinguisticFeatureGlossary)がこれを表示する。
features:
  # --- 読みの変化(連濁系) ---
  - name: 連濁
    description: 複合語を作るとき、後ろの要素の語頭の清音が濁音に変わる現象。
    examples:
      - 硫黄 + 島 → いおうじま（シマ → ジマ）
      - 手 + 紙 → てがみ（カミ → ガミ）
      - 青 + 空 → あおぞら（ソラ → ゾラ）
      - 花 + 火 → はなび（ヒ → ビ）
  - name: 半濁音化
    description: 複合や促音の直後で、後ろの要素の語頭のハ行音が半濁音(パ行)に変わる現象。
    examples:
      - 出 + 発 → しゅっぱつ（ハツ → パツ）
      - 切 + 符 → きっぷ（フ → プ）
      - 一 + 本 → いっぽん（ホン → ポン）
      - 突 + 風 → とっぷう（フウ → プウ）
  - name: 連声
    description: 前の音節の末尾の子音(ン・チ・ツ)が、後ろに続く母音・半母音と結びついてナ行・マ行・タ行の音に変わる現象。
    examples:
      - 反 + 応 → はんのう（オウ → ノウ）
      - 三 + 位 → さんみ（イ → ミ）
      - 観 + 音 → かんのん（オン → ノン）
      - 因 + 縁 → いんねん（エン → ネン）
      - 天 + 皇 → てんのう（オウ → ノウ）
  - name: 音韻添加
    description: 複合語を作るとき、もとの語には無い音が間に加わる現象。
    examples:
      - 真 + 中 → まんなか（ン が加わる）
      - 春 + 雨 → はるさめ（サ が加わる）
      - 小 + 雨 → こさめ（サ が加わる）
      - 真 + 白 → まっしろ（ッ が加わる）
  - name: 音韻脱落
    description: 複合や語形成の際に、もとの語にあった音が落ちる現象。
    examples:
      - 河(かわ) + 原(はら) → かわら（ハ が落ちる）
      - こんにちは → こんちは（口語での脱落）
      - すみません → すいません（口語での脱落）
  - name: 転音
    description: 複合語を作るとき、前の要素の末尾の母音が別の母音に交替する現象(被覆形と露出形)。
    examples:
      - 雨(あめ) + 傘 → あまがさ（メ → マ）
      - 酒(さけ) + 屋 → さかや（ケ → カ）
      - 木(き) + 陰 → こかげ（キ → コ）
      - 目(め) + 蓋 → まぶた（メ → マ）
      - 風(かぜ) + 車 → かざぐるま（ゼ → ザ）
  - name: 促音化
    description: 複合語を作るとき、前の要素の末尾の音(チ・ツ・ク・キ)が促音「ッ」に変わる現象。もとに無い音が加わる音韻添加とは違い、既にある音が置き換わる。
    examples:
      - 活(かつ) + 版 → かっぱん（ツ → ッ）
      - 一(いち) + 回 → いっかい（チ → ッ）
      - 学(がく) + 校 → がっこう（ク → ッ）
      - 実(じつ) + 際 → じっさい（ツ → ッ）
      - 日(にち) + 記 → にっき（チ → ッ）
  # --- 漢字の読みの当て方 ---
  - name: 熟字訓
    description: 漢字1字ずつではなく、熟語全体に対してまとめて訓読みを当てた読み方。
    examples:
      - 五月雨 → さみだれ
      - 硫黄 → いおう
      - 大人 → おとな
      - 田舎 → いなか
      - 土産 → みやげ
  - name: 重箱読み
    description: 二字熟語で、前の字を音読み・後ろの字を訓読みで読む読み方。
    examples:
      - 重箱 → ジュウ(音) + ばこ(訓)
      - 台所 → ダイ(音) + どころ(訓)
      - 番組 → バン(音) + ぐみ(訓)
      - 額縁 → ガク(音) + ぶち(訓)
  - name: 湯桶読み
    description: 二字熟語で、前の字を訓読み・後ろの字を音読みで読む読み方(重箱読みの逆)。
    examples:
      - 湯桶 → ゆ(訓) + トウ(音)
      - 手本 → て(訓) + ホン(音)
      - 見本 → み(訓) + ホン(音)
      - 夕刊 → ゆう(訓) + カン(音)
  - name: 当て字
    description: 漢字の意味とは無関係に、音や訓だけを借りて漢字を当てた表記(またはその読み)。
    examples:
      - 目出度い → めでたい
      - 珈琲 → コーヒー
      - 倶楽部 → クラブ
      - 滅茶苦茶 → めちゃくちゃ
  - name: 古式読み
    description: 現代の読み方が定着する以前の、古い時代の読み方・語形を保った読み。姓と名の間に「の」を挟む古代人名の読みなど。
    examples:
      - 中臣鎌足 → なかとみのかまたり（「の」を挟む）
      - 蘇我馬子 → そがのうまこ（「の」を挟む）
      - 小野妹子 → おののいもこ（「の」を挟む）
  - name: 特殊読み
    description: 一般の読みの規則によらず、作品・商標などの慣習で表記に固有の読みを与えたもの(いわゆる当てルビを含む)。
    examples:
      - 青眼の白龍 → ブルーアイズ・ホワイト・ドラゴン
      - 本気 → マジ（当てルビ）
      - 宇宙 → そら（当てルビ）
  # --- 音便(4種) ---
  - name: イ音便
    description: 活用などの際に「き・ぎ」などの音が「い」に変わる音便。
    examples:
      - 書きて → 書いて
      - 咲きて → 咲いて
      - 急ぎて → 急いで
  - name: 促音便
    description: 活用などの際に「ち・り・ひ」などの音が促音「っ」に変わる音便。
    examples:
      - 立ちて → 立って
      - 取りて → 取って
      - 買ひて → 買って
  - name: 撥音便
    description: 活用などの際に「に・び・み」などの音が撥音「ん」に変わる音便。
    examples:
      - 死にて → 死んで
      - 飛びて → 飛んで
      - 読みて → 読んで
  - name: ウ音便
    description: 活用などの際に「く・ぐ・ひ・び・み」などの音が「う」に変わる音便。
    examples:
      - ありがたく → ありがとう
      - おめでたく → おめでとう
      - 問ひて → 問うて
  # --- 語形成 ---
  - name: 畳語
    description: 同じ語基を繰り返して1語を作る語形成。繰り返しの後部で連濁を伴うことが多い。
    examples:
      - 人 + 人 → 人々（ひとびと）
      - 時 + 時 → 時々（ときどき）
      - 山 + 山 → 山々（やまやま）
      - 国 + 国 → 国々（くにぐに）
  # --- オノマトペ ---
  - name: オノマトペ（擬音語）
    description: 実際に鳴っている音・声をまねて作られた語(擬声語を含む)。
    examples:
      - わんわん（犬の声）
      - ざあざあ（雨の音）
      - がちゃん（物がぶつかる音）
      - ごろごろ（雷の音）
  - name: オノマトペ（擬態語）
    description: 音のしない状態・様子・心情を、音の感覚に写して表した語(擬容語・擬情語を含む)。
    examples:
      - きらきら（光る様子）
      - うろうろ（歩き回る様子）
      - いらいら（心情）
      - ふわふわ（感触・様子）
